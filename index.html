<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>現場管理アプリ</title>
<script type="module">
  import { initializeApp } from 'https://cdn.jsdelivr.net/npm/firebase@10.12.0/app/+esm';
  import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged, sendPasswordResetEmail, reauthenticateWithCredential, EmailAuthProvider, updatePassword } from 'https://cdn.jsdelivr.net/npm/firebase@10.12.0/auth/+esm';
  import { getDatabase, ref, push, update, remove, onValue } from 'https://cdn.jsdelivr.net/npm/firebase@10.12.0/database/+esm';
  import * as XLSX from 'https://cdn.jsdelivr.net/npm/xlsx@0.18.5/+esm';

  const firebaseConfig = {
    apiKey:            "AIzaSyCSn1ziRG7YfUrccqNAZHW9SUG-R7LdqWk",
    authDomain:        "genba-kanri-955bc.firebaseapp.com",
    databaseURL:       "https://genba-kanri-955bc-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId:         "genba-kanri-955bc",
    storageBucket:     "genba-kanri-955bc.firebasestorage.app",
    messagingSenderId: "79786935327",
    appId:             "1:79786935327:web:134f2bfe6b49f79b1c012a"
  };

  const app  = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db   = getDatabase(app);

  /* ============================== */

  let allRecords   = {};
  let editingId    = null;
  let currentMonth = '';
  let unsubDb      = null;

  /* ---- Auth state ---- */
  onAuthStateChanged(auth, user => {
    document.getElementById('loading').style.display = 'none';
    if (user) {
      document.getElementById('user-email-badge').textContent = user.email;
      document.getElementById('login-screen').classList.add('hidden');
      document.getElementById('app-screen').style.display = 'block';
      initApp();
    } else {
      if (unsubDb) { unsubDb(); unsubDb = null; }
      document.getElementById('app-screen').style.display = 'none';
      document.getElementById('login-screen').classList.remove('hidden');
    }
  });

  /* ---- Login / Logout ---- */
  window.doLogin = function() {
    const email = document.getElementById('login-email').value.trim();
    const pass  = document.getElementById('login-pass').value;
    const btn   = document.getElementById('login-btn');
    const err   = document.getElementById('login-error');
    err.classList.remove('show');
    if (!email || !pass) { showLoginError('メールアドレスとパスワードを入力してください'); return; }
    btn.disabled = true;
    btn.textContent = 'ログイン中...';
    signInWithEmailAndPassword(auth, email, pass)
      .catch(e => {
        showLoginError(loginErrorMsg(e.code));
        btn.disabled = false;
        btn.textContent = 'ログイン';
      });
  };

  window.doLogout = function() { signOut(auth); };

  /* ---- Panel switcher ---- */
  window.showPanel = function(id) {
    ['login-card','reset-card','change-card'].forEach(p => {
      document.getElementById(p).classList.add('hidden');
    });
    document.getElementById(id).classList.remove('hidden');
    // エラー・成功メッセージリセット
    ['reset-error','reset-success','change-error','change-success'].forEach(el => {
      const e = document.getElementById(el);
      if (e) { e.classList.remove('show'); e.classList.add('hidden'); }
    });
  };

  /* ---- パスワードリセットメール送信 ---- */
  window.doResetEmail = function() {
    const email = document.getElementById('reset-email').value.trim();
    const btn   = document.getElementById('reset-btn');
    const err   = document.getElementById('reset-error');
    const suc   = document.getElementById('reset-success');
    err.classList.remove('show');
    suc.classList.add('hidden');
    if (!email) { err.textContent = 'メールアドレスを入力してください'; err.classList.add('show'); return; }
    btn.disabled = true; btn.textContent = '送信中...';
    sendPasswordResetEmail(auth, email)
      .then(() => { suc.classList.remove('hidden'); })
      .catch(e => {
        const msg = e.code === 'auth/user-not-found' ? 'このメールアドレスは登録されていません' : 'エラーが発生しました（' + e.code + '）';
        err.textContent = msg; err.classList.add('show');
      })
      .finally(() => { btn.disabled = false; btn.textContent = 'リセットメールを送信'; });
  };

  /* ---- パスワード変更（ログイン後） ---- */
  window.openChangePanel = function() {
    document.getElementById('app-screen').style.display = 'none';
    document.getElementById('login-screen').classList.remove('hidden');
    window.showPanel('change-card');
    document.getElementById('change-current').value = '';
    document.getElementById('change-new').value     = '';
    document.getElementById('change-confirm').value = '';
  };

  window.closeChangePanel = function() {
    document.getElementById('login-screen').classList.add('hidden');
    document.getElementById('app-screen').style.display = 'block';
  };

  window.doChangePassword = function() {
    const current  = document.getElementById('change-current').value;
    const newPass  = document.getElementById('change-new').value;
    const confirm  = document.getElementById('change-confirm').value;
    const btn      = document.getElementById('change-btn');
    const err      = document.getElementById('change-error');
    const suc      = document.getElementById('change-success');
    err.classList.remove('show'); suc.classList.add('hidden');
    if (!current)            { err.textContent = '現在のパスワードを入力してください'; err.classList.add('show'); return; }
    if (newPass.length < 6)  { err.textContent = '新しいパスワードは6文字以上にしてください'; err.classList.add('show'); return; }
    if (newPass !== confirm)  { err.textContent = '新しいパスワードが一致しません'; err.classList.add('show'); return; }
    btn.disabled = true; btn.textContent = '変更中...';
    const user       = auth.currentUser;
    const credential = EmailAuthProvider.credential(user.email, current);
    reauthenticateWithCredential(user, credential)
      .then(() => updatePassword(user, newPass))
      .then(() => {
        suc.classList.remove('hidden');
        document.getElementById('change-current').value = '';
        document.getElementById('change-new').value     = '';
        document.getElementById('change-confirm').value = '';
        setTimeout(() => window.closeChangePanel(), 1500);
      })
      .catch(e => {
        const msg = (e.code === 'auth/wrong-password' || e.code === 'auth/invalid-credential')
          ? '現在のパスワードが正しくありません'
          : 'エラーが発生しました（' + e.code + '）';
        err.textContent = msg; err.classList.add('show');
      })
      .finally(() => { btn.disabled = false; btn.textContent = 'パスワードを変更する'; });
  };

  function showLoginError(msg) {
    const el = document.getElementById('login-error');
    el.textContent = msg;
    el.classList.add('show');
  }
  function loginErrorMsg(code) {
    const map = {
      'auth/user-not-found':     'アカウントが見つかりません',
      'auth/wrong-password':     'パスワードが間違っています',
      'auth/invalid-email':      'メールアドレスの形式が正しくありません',
      'auth/invalid-credential': 'メールアドレスまたはパスワードが正しくありません',
      'auth/too-many-requests':  'しばらく時間をおいてから再試行してください',
    };
    return map[code] || 'ログインに失敗しました（' + code + '）';
  }

  document.getElementById('login-pass').addEventListener('keydown', e => {
    if (e.key === 'Enter') window.doLogin();
  });

  /* ---- App init ---- */
  function initApp() {
    setTodayDate();
    buildMonthOptions();
    listenRecords();
  }

  function setTodayDate() {
    document.getElementById('f-date').value = toDateStr(new Date());
  }

  /* ---- Month select ---- */
  function buildMonthOptions() {
    const sel = document.getElementById('month-select');
    sel.innerHTML = '';
    const now = new Date();
    for (let i = 0; i < 24; i++) {
      const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
      const val   = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
      const label = `${d.getFullYear()}年${d.getMonth()+1}月`;
      const opt = document.createElement('option');
      opt.value = val; opt.textContent = label;
      sel.appendChild(opt);
    }
    currentMonth = sel.value;
    updateMonthLabels();
  }

  window.onMonthChange = function() {
    currentMonth = document.getElementById('month-select').value;
    updateMonthLabels();
    renderTable();
    updateSummary();
  };

  function updateMonthLabels() {
    const [y, m] = currentMonth.split('-');
    const label = `${y}年${parseInt(m)}月`;
    document.getElementById('sum-month-label').textContent  = label;
    document.getElementById('sum-month-label2').textContent = label;
  }

  /* ---- Firebase listener ---- */
  function listenRecords() {
    const dbRef = ref(db, 'records');
    unsubDb = onValue(dbRef, snap => {
      allRecords = snap.val() || {};
      renderTable();
      updateSummary();
    });
  }

  /* ---- Render table ---- */
  function renderTable() {
    const filtered = getFiltered();
    const tbody = document.getElementById('records-tbody');
    const empty = document.getElementById('empty-state');

    if (filtered.length === 0) {
      tbody.innerHTML = '';
      empty.classList.remove('hidden');
      document.getElementById('record-count').textContent = '0件';
      return;
    }
    empty.classList.add('hidden');
    document.getElementById('record-count').textContent = filtered.length + '件';

    filtered.sort((a, b) => b.date.localeCompare(a.date));
    tbody.innerHTML = filtered.map(r => `
      <tr>
        <td class="td-date">${formatDate(r.date)}</td>
        <td class="td-name">${esc(r.name)}</td>
        <td class="td-amount">${formatAmount(r.amount)}</td>
        <td class="td-note">${esc(r.note || '—')}</td>
        <td class="td-actions">
          <button class="btn-edit" onclick="startEdit('${r.id}')">編集</button>
          <button class="btn-del"  onclick="deleteRecord('${r.id}')">削除</button>
        </td>
      </tr>
    `).join('');
  }

  /* ---- Summary ---- */
  function updateSummary() {
    const filtered = getFiltered();
    const total = filtered.reduce((s, r) => s + (Number(r.amount) || 0), 0);
    document.getElementById('sum-count').textContent  = filtered.length.toLocaleString();
    document.getElementById('sum-amount').textContent = total.toLocaleString();
  }

  function getFiltered() {
    return Object.entries(allRecords)
      .map(([id, v]) => ({ id, ...v }))
      .filter(r => r.date && r.date.startsWith(currentMonth));
  }

  /* ---- Submit ---- */
  window.submitRecord = function() {
    const date   = document.getElementById('f-date').value;
    const name   = document.getElementById('f-name').value.trim();
    const amount = document.getElementById('f-amount').value;
    const note   = document.getElementById('f-note').value.trim();

    if (!date)   { showToast('日付を入力してください'); return; }
    if (!name)   { showToast('現場名を入力してください'); return; }
    if (!amount) { showToast('金額を入力してください'); return; }

    const btn = document.getElementById('submit-btn');
    btn.disabled = true;
    const record = { date, name, amount: Number(amount), note };

    const promise = editingId
      ? update(ref(db, 'records/' + editingId), record)
      : push(ref(db, 'records'), record);

    promise.then(() => {
      showToast(editingId ? '更新しました' : '登録しました');
      resetForm();
    }).catch(() => {
      showToast('エラーが発生しました');
    }).finally(() => {
      btn.disabled = false;
    });
  };

  /* ---- Edit ---- */
  window.startEdit = function(id) {
    const r = allRecords[id];
    if (!r) return;
    editingId = id;
    document.getElementById('f-date').value   = r.date;
    document.getElementById('f-name').value   = r.name;
    document.getElementById('f-amount').value = r.amount;
    document.getElementById('f-note').value   = r.note || '';
    document.getElementById('form-title-label').textContent = '編集中';
    document.getElementById('submit-btn').textContent       = '更新する';
    document.getElementById('cancel-btn').style.display     = 'block';
    window.scrollTo({ top: 0, behavior: 'smooth' });
  };

  window.cancelEdit = function() { resetForm(); };

  function resetForm() {
    editingId = null;
    document.getElementById('f-date').value   = toDateStr(new Date());
    document.getElementById('f-name').value   = '';
    document.getElementById('f-amount').value = '';
    document.getElementById('f-note').value   = '';
    document.getElementById('form-title-label').textContent = '新規登録';
    document.getElementById('submit-btn').textContent       = '登録する';
    document.getElementById('cancel-btn').style.display     = 'none';
  }

  /* ---- Delete ---- */
  window.deleteRecord = function(id) {
    if (!confirm('このデータを削除しますか？')) return;
    remove(ref(db, 'records/' + id))
      .then(() => showToast('削除しました'))
      .catch(() => showToast('削除に失敗しました'));
  };

  /* ---- Excel Export ---- */
  window.exportExcel = function() {
    const filtered = getFiltered();
    if (filtered.length === 0) { showToast('エクスポートするデータがありません'); return; }
    filtered.sort((a, b) => a.date.localeCompare(b.date));

    const [y, m] = currentMonth.split('-');
    const rows = [
      ['日付', '現場名', '金額（円）', '備考'],
      ...filtered.map(r => [r.date, r.name, Number(r.amount), r.note || '']),
      ['', '合計', filtered.reduce((s, r) => s + Number(r.amount||0), 0), '']
    ];

    const ws = XLSX.utils.aoa_to_sheet(rows);
    ws['!cols'] = [{ wch: 14 }, { wch: 30 }, { wch: 16 }, { wch: 30 }];
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, `${y}年${parseInt(m)}月`.slice(0, 31));
    XLSX.writeFile(wb, `現場管理_${currentMonth}.xlsx`);
    showToast('Excelをダウンロードしました');
  };

  /* ---- Helpers ---- */
  function toDateStr(d) {
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  }
  function formatDate(str) {
    if (!str) return '';
    const [y, m, d] = str.split('-');
    return `${y}/${m}/${d}`;
  }
  function formatAmount(v) {
    return '¥' + Number(v||0).toLocaleString();
  }
  function esc(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  let toastTimer = null;
  function showToast(msg) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => el.classList.remove('show'), 2500);
  }
</script>
<style>
  /* ===== Reset & Base ===== */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg:        #0F1117;
    --surface:   #1A1D27;
    --surface2:  #222535;
    --border:    #2E3148;
    --text:      #E8EAF0;
    --muted:     #6B7194;
    --accent:    #6C8EFF;
    --accent-bg: #1A2040;
    --accent-bd: #3A4F9A;
    --danger:    #FF5C5C;
    --danger-bg: #2A1010;
    --success:   #3DD68C;
    --radius-sm: 8px;
    --radius-md: 12px;
    --radius-lg: 16px;
    --font-mono: 'DM Mono', 'Courier New', monospace;
    --shadow-sm: 0 1px 3px rgba(0,0,0,.3), 0 1px 2px rgba(0,0,0,.2);
    --shadow-md: 0 4px 24px rgba(0,0,0,.4);
  }
  body {
    font-family: 'Hiragino Kaku Gothic ProN', 'Noto Sans JP', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100dvh;
    font-size: 14px;
    line-height: 1.6;
  }

  /* ===== Utilities ===== */
  .hidden { display: none !important; }
  .sr-only { position: absolute; width: 1px; height: 1px; overflow: hidden; clip: rect(0,0,0,0); }

  /* ===== Login Screen ===== */
  #login-screen {
    min-height: 100dvh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 1.5rem;
    background: var(--surface2);
  }
  .login-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 2.5rem 2rem;
    width: 100%;
    max-width: 380px;
    box-shadow: var(--shadow-md);
  }
  .login-logo {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 2rem;
  }
  .login-logo-icon {
    width: 40px;
    height: 40px;
    background: var(--text);
    border-radius: var(--radius-sm);
    display: flex;
    align-items: center;
    justify-content: center;
    color: #fff;
    font-size: 20px;
    flex-shrink: 0;
  }
  .login-logo-text { font-size: 16px; font-weight: 700; letter-spacing: -.02em; }
  .login-logo-sub  { font-size: 11px; color: var(--muted); margin-top: 1px; }
  .login-title { font-size: 22px; font-weight: 700; margin-bottom: .25rem; letter-spacing: -.02em; }
  .login-subtitle { font-size: 13px; color: var(--muted); margin-bottom: 2rem; }
  .field { margin-bottom: 1rem; }
  .field label { display: block; font-size: 12px; font-weight: 600; color: var(--muted); margin-bottom: 6px; letter-spacing: .04em; text-transform: uppercase; }
  .field input {
    width: 100%;
    padding: 10px 14px;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    font-size: 14px;
    color: var(--text);
    background: var(--surface);
    outline: none;
    transition: border-color .15s;
    font-family: inherit;
  }
  .field input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-bg); }
  .btn-primary {
    width: 100%;
    padding: 11px;
    background: var(--text);
    color: #fff;
    border: none;
    border-radius: var(--radius-sm);
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    margin-top: .5rem;
    transition: opacity .15s, transform .1s;
    font-family: inherit;
  }
  .btn-primary:hover { opacity: .85; }
  .btn-primary:active { transform: scale(.98); }
  .btn-primary:disabled { opacity: .5; cursor: not-allowed; }
  .error-msg {
    background: var(--danger-bg);
    border: 1px solid #FECACA;
    color: var(--danger);
    border-radius: var(--radius-sm);
    padding: 10px 14px;
    font-size: 13px;
    margin-bottom: 1rem;
    display: none;
  }
  .error-msg.show { display: block; }

  /* ===== App Screen ===== */
  #app-screen { display: none; }
  .app-header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: .875rem 1.25rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .app-header-left { display: flex; align-items: center; gap: 10px; }
  .app-header-logo {
    width: 32px; height: 32px;
    background: var(--text);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    color: #fff; font-size: 16px; flex-shrink: 0;
  }
  .app-header-title { font-size: 15px; font-weight: 700; letter-spacing: -.02em; }
  .app-header-right { display: flex; align-items: center; gap: 8px; }
  .user-badge {
    font-size: 12px;
    color: var(--muted);
    display: none;
  }
  @media (min-width: 480px) { .user-badge { display: block; } }
  .btn-icon {
    border: 1px solid var(--border);
    background: var(--surface);
    border-radius: var(--radius-sm);
    padding: 6px 12px;
    font-size: 12px;
    color: var(--muted);
    cursor: pointer;
    display: flex; align-items: center; gap: 5px;
    font-family: inherit;
    transition: background .15s, color .15s;
  }
  .btn-icon:hover { background: var(--bg); color: var(--text); }

  .app-main {
    max-width: 800px;
    margin: 0 auto;
    padding: 1.5rem 1rem 4rem;
  }

  /* ===== Summary Cards ===== */
  .summary-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 1.25rem;
  }
  .summary-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-md);
    padding: 1rem 1.25rem;
  }
  .summary-label { font-size: 11px; font-weight: 600; color: var(--muted); letter-spacing: .05em; text-transform: uppercase; margin-bottom: 8px; }
  .summary-value { font-size: 28px; font-weight: 700; letter-spacing: -.03em; font-family: var(--font-mono); }
  .summary-unit  { font-size: 13px; font-weight: 400; color: var(--muted); margin-left: 3px; }
  .summary-filter { font-size: 11px; color: var(--muted); margin-top: 4px; }

  /* ===== Month Filter ===== */
  .filter-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
    margin-bottom: 1.25rem;
    flex-wrap: wrap;
  }
  .filter-bar-left { display: flex; align-items: center; gap: 8px; }
  select.month-select {
    padding: 7px 12px;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    font-size: 14px;
    font-weight: 600;
    color: var(--text);
    background: var(--surface);
    cursor: pointer;
    outline: none;
    font-family: inherit;
  }
  select.month-select:focus { border-color: var(--accent); }
  .record-count { font-size: 13px; color: var(--muted); }
  .btn-excel {
    border: 1px solid var(--border);
    background: var(--surface);
    border-radius: var(--radius-sm);
    padding: 7px 14px;
    font-size: 13px;
    font-weight: 600;
    color: var(--success);
    cursor: pointer;
    display: flex; align-items: center; gap: 5px;
    font-family: inherit;
    transition: background .15s;
  }
  .btn-excel:hover { background: #F0FDF4; }

  /* ===== Form Section ===== */
  .section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-md);
    padding: 1.25rem;
    margin-bottom: 1.25rem;
  }
  .section-title {
    font-size: 13px;
    font-weight: 700;
    color: var(--muted);
    letter-spacing: .05em;
    text-transform: uppercase;
    margin-bottom: 1rem;
  }
  .form-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }
  @media (max-width: 480px) { .form-grid { grid-template-columns: 1fr; } }
  .form-field label {
    display: block;
    font-size: 12px;
    font-weight: 600;
    color: var(--muted);
    margin-bottom: 5px;
    letter-spacing: .03em;
  }
  .form-field input,
  .form-field textarea {
    width: 100%;
    padding: 9px 12px;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    font-size: 14px;
    color: var(--text);
    background: var(--surface);
    outline: none;
    transition: border-color .15s;
    font-family: inherit;
  }
  .form-field input:focus,
  .form-field textarea:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-bg); }
  .form-field textarea { resize: vertical; min-height: 64px; }
  .form-field.span2 { grid-column: span 2; }
  @media (max-width: 480px) { .form-field.span2 { grid-column: span 1; } }
  .form-actions { margin-top: 12px; display: flex; gap: 8px; }
  .btn-submit {
    flex: 1;
    padding: 10px;
    background: var(--text);
    color: #fff;
    border: none;
    border-radius: var(--radius-sm);
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
    transition: opacity .15s;
  }
  .btn-submit:hover { opacity: .85; }
  .btn-submit:disabled { opacity: .5; cursor: not-allowed; }
  .btn-cancel {
    padding: 10px 18px;
    background: var(--bg);
    color: var(--muted);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
    display: none;
  }
  .btn-cancel:hover { color: var(--text); }

  /* ===== Table ===== */
  .table-section { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-md); overflow: hidden; }
  .table-wrapper { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; }
  th {
    text-align: left;
    padding: 10px 14px;
    font-size: 11px;
    font-weight: 700;
    color: var(--muted);
    letter-spacing: .05em;
    text-transform: uppercase;
    border-bottom: 1px solid var(--border);
    white-space: nowrap;
    background: var(--bg);
  }
  td {
    padding: 12px 14px;
    border-bottom: 1px solid var(--border);
    font-size: 13px;
    vertical-align: middle;
  }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: var(--bg); }
  .td-date { font-family: var(--font-mono); font-size: 12px; color: var(--muted); white-space: nowrap; }
  .td-name { font-weight: 600; max-width: 180px; }
  .td-amount { font-family: var(--font-mono); font-size: 13px; font-weight: 600; white-space: nowrap; text-align: right; }
  .td-note { color: var(--muted); max-width: 140px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .td-actions { white-space: nowrap; text-align: right; }
  .btn-edit, .btn-del {
    border: 1px solid var(--border);
    background: none;
    border-radius: 6px;
    padding: 4px 10px;
    font-size: 12px;
    cursor: pointer;
    font-family: inherit;
    transition: background .12s;
  }
  .btn-edit { color: var(--accent); margin-right: 4px; }
  .btn-edit:hover { background: var(--accent-bg); border-color: var(--accent-bd); }
  .btn-del  { color: var(--danger); }
  .btn-del:hover { background: var(--danger-bg); border-color: #FECACA; }
  .empty-state {
    text-align: center;
    padding: 3rem 1rem;
    color: var(--muted);
    font-size: 13px;
  }
  .empty-icon { font-size: 32px; margin-bottom: .75rem; opacity: .4; }

  /* ===== Toast ===== */
  .toast {
    position: fixed;
    bottom: 1.5rem;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--text);
    color: #fff;
    padding: 10px 20px;
    border-radius: 99px;
    font-size: 13px;
    font-weight: 500;
    opacity: 0;
    transition: opacity .2s, transform .2s;
    pointer-events: none;
    white-space: nowrap;
    z-index: 999;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* ===== Loading ===== */
  .link-btn {
    background: none;
    border: none;
    color: var(--accent);
    font-size: 13px;
    cursor: pointer;
    font-family: inherit;
    padding: 0;
    text-decoration: underline;
    text-underline-offset: 3px;
  }
  .link-btn:hover { opacity: .75; }
  .success-msg {
    background: #0D2B1A;
    border: 1px solid #1A5C35;
    color: var(--success);
    border-radius: var(--radius-sm);
    padding: 10px 14px;
    font-size: 13px;
    margin-bottom: 1rem;
  }
  .loading-overlay {
    position: fixed; inset: 0;
    background: var(--bg);
    display: flex; align-items: center; justify-content: center;
    z-index: 9999;
    font-size: 13px;
    color: var(--muted);
    flex-direction: column;
    gap: 12px;
  }
  .spinner {
    width: 28px; height: 28px;
    border: 2px solid var(--border);
    border-top-color: var(--text);
    border-radius: 50%;
    animation: spin .7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<!-- Loading -->
<div class="loading-overlay" id="loading">
  <div class="spinner"></div>
  <span>読み込み中...</span>
</div>

<!-- ===== Login ===== -->
<div id="login-screen" class="hidden">

  <!-- ログインカード -->
  <div class="login-card" id="login-card">
    <div class="login-logo">
      <div class="login-logo-icon">🏗</div>
      <div>
        <div class="login-logo-text">現場管理</div>
        <div class="login-logo-sub">Genba Kanri System</div>
      </div>
    </div>
    <h1 class="login-title">ログイン</h1>
    <p class="login-subtitle">メールアドレスとパスワードを入力してください</p>
    <div class="error-msg" id="login-error"></div>
    <div class="field">
      <label>メールアドレス</label>
      <input type="email" id="login-email" placeholder="you@example.com" autocomplete="email">
    </div>
    <div class="field">
      <label>パスワード</label>
      <input type="password" id="login-pass" placeholder="••••••••" autocomplete="current-password">
    </div>
    <button class="btn-primary" id="login-btn" onclick="doLogin()">ログイン</button>
    <div style="text-align:center; margin-top:1.25rem;">
      <button class="link-btn" onclick="showPanel('reset-card')">パスワードをお忘れですか？</button>
    </div>
  </div>

  <!-- パスワードリセット（メール送信）カード -->
  <div class="login-card hidden" id="reset-card">
    <div class="login-logo">
      <div class="login-logo-icon">🏗</div>
      <div>
        <div class="login-logo-text">現場管理</div>
        <div class="login-logo-sub">Genba Kanri System</div>
      </div>
    </div>
    <h1 class="login-title">パスワード再設定</h1>
    <p class="login-subtitle">登録済みのメールアドレスにリセットリンクを送ります</p>
    <div class="error-msg" id="reset-error"></div>
    <div class="success-msg hidden" id="reset-success">リセットメールを送信しました。メールをご確認ください。</div>
    <div class="field">
      <label>メールアドレス</label>
      <input type="email" id="reset-email" placeholder="you@example.com" autocomplete="email">
    </div>
    <button class="btn-primary" id="reset-btn" onclick="doResetEmail()">リセットメールを送信</button>
    <div style="text-align:center; margin-top:1.25rem;">
      <button class="link-btn" onclick="showPanel('login-card')">← ログインに戻る</button>
    </div>
  </div>

  <!-- パスワード変更（ログイン後）カード -->
  <div class="login-card hidden" id="change-card">
    <div class="login-logo">
      <div class="login-logo-icon">🏗</div>
      <div>
        <div class="login-logo-text">現場管理</div>
        <div class="login-logo-sub">Genba Kanri System</div>
      </div>
    </div>
    <h1 class="login-title">パスワード変更</h1>
    <p class="login-subtitle">現在のパスワードで認証してから新しいパスワードに変更します</p>
    <div class="error-msg" id="change-error"></div>
    <div class="success-msg hidden" id="change-success">パスワードを変更しました。</div>
    <div class="field">
      <label>現在のパスワード</label>
      <input type="password" id="change-current" placeholder="••••••••">
    </div>
    <div class="field">
      <label>新しいパスワード</label>
      <input type="password" id="change-new" placeholder="••••••••（6文字以上）">
    </div>
    <div class="field">
      <label>新しいパスワード（確認）</label>
      <input type="password" id="change-confirm" placeholder="••••••••">
    </div>
    <button class="btn-primary" id="change-btn" onclick="doChangePassword()">パスワードを変更する</button>
    <div style="text-align:center; margin-top:1.25rem;">
      <button class="link-btn" onclick="closeChangePanel()">← キャンセル</button>
    </div>
  </div>

</div>

<!-- ===== App ===== -->
<div id="app-screen">

  <header class="app-header">
    <div class="app-header-left">
      <div class="app-header-logo">🏗</div>
      <div class="app-header-title">現場管理</div>
    </div>
    <div class="app-header-right">
      <span class="user-badge" id="user-email-badge"></span>
      <button class="btn-icon" onclick="openChangePanel()">
        <span>パスワード変更</span>
      </button>
      <button class="btn-icon" onclick="doLogout()">
        <span>ログアウト</span>
      </button>
    </div>
  </header>

  <main class="app-main">

    <!-- 登録フォーム -->
    <div class="section">
      <div class="section-title" id="form-title-label">新規登録</div>
      <div class="form-grid">
        <div class="form-field">
          <label>日付</label>
          <input type="date" id="f-date">
        </div>
        <div class="form-field">
          <label>現場名</label>
          <input type="text" id="f-name" placeholder="例：〇〇橋 近接点検">
        </div>
        <div class="form-field">
          <label>金額（円）</label>
          <input type="number" id="f-amount" placeholder="例：150000" min="0">
        </div>
        <div class="form-field">
          <label>備考</label>
          <input type="text" id="f-note" placeholder="メモ（任意）">
        </div>
      </div>
      <div class="form-actions">
        <button class="btn-submit" id="submit-btn" onclick="submitRecord()">登録する</button>
        <button class="btn-cancel" id="cancel-btn" onclick="cancelEdit()">キャンセル</button>
      </div>
    </div>

    <!-- サマリー -->
    <div class="summary-grid">
      <div class="summary-card">
        <div class="summary-label">現場数</div>
        <div><span class="summary-value" id="sum-count">0</span><span class="summary-unit">件</span></div>
        <div class="summary-filter" id="sum-month-label">—</div>
      </div>
      <div class="summary-card">
        <div class="summary-label">合計金額</div>
        <div><span class="summary-value" id="sum-amount">0</span><span class="summary-unit">円</span></div>
        <div class="summary-filter" id="sum-month-label2">—</div>
      </div>
    </div>

    <!-- 月フィルター -->
    <div class="filter-bar">
      <div class="filter-bar-left">
        <select class="month-select" id="month-select" onchange="onMonthChange()"></select>
        <span class="record-count" id="record-count"></span>
      </div>
    </div>

    <!-- テーブル -->
    <div class="table-section">
      <div class="table-wrapper">
        <table>
          <thead>
            <tr>
              <th>日付</th>
              <th>現場名</th>
              <th style="text-align:right">金額</th>
              <th>備考</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="records-tbody"></tbody>
        </table>
        <div class="empty-state hidden" id="empty-state">
          <div class="empty-icon">📋</div>
          <div>この月のデータはありません</div>
        </div>
      </div>
    </div>

    <!-- エクスポート -->
    <div style="margin-top: 1rem; display: flex; justify-content: flex-end;">
      <button class="btn-excel" onclick="exportExcel()">
        <span>↓</span> Excelエクスポート
      </button>
    </div>

  </main>
</div>

<div class="toast" id="toast"></div>




</body>
</html>
